name: Build and deploy Node app to Azure Web App - api-srf-databricks-axsa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: |
            backend/**
            frontend/dist/**
            backend/.env.example
            frontend/.env.example
            README.md
            .gitignore
            .deployment

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app-artifact

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0EB9137ECA2E4B1B887C883E4C19C002 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0D832E67C2104DA288F59A853B733030 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_24FBA15A370A4CD58B768EB252CFA6D3 }}

      - name: Enforce Node runtime and disable Oryx remote build
        run: |
          RG=$(az webapp list --query "[?name=='api-srf-databricks-axsa'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "Could not resolve resource group for app: api-srf-databricks-axsa"
            exit 1
          fi

          az webapp config set \
            --resource-group "$RG" \
            --name api-srf-databricks-axsa \
            --linux-fx-version "NODE|22-lts" \
            --startup-file "node backend/server.js"

          az webapp config appsettings set \
            --resource-group "$RG" \
            --name api-srf-databricks-axsa \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false WEBSITE_RUN_FROM_PACKAGE=1

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'api-srf-databricks-axsa'
          slot-name: 'Production'
          package: .
          