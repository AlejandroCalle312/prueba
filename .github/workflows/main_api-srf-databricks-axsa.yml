name: Build and deploy SRF AXSA app to Azure Web App - api-srpf-databricks-axsa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r serving/srf-axsa-api/requirements.txt

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: |
            serving/**
            presentation/**

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app-artifact

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5E5558E291D84057B4ECBC4F158F3569 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_829B6054A06D4C638D638A45B425487B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4F24269FD5854B5FA57D9539DB40C54E }}

      - name: Configure runtime and startup command
        run: |
          az webapp config set \
            --resource-group "rg-srpf-prod-axsa" \
            --name api-srpf-databricks-axsa \
            --linux-fx-version "PYTHON|3.12" \
            --startup-file "python -m pip install -r serving/srf-axsa-api/requirements.txt && python -m uvicorn app:app --host 0.0.0.0 --port \$PORT --app-dir serving/srf-axsa-api"

          az webapp config appsettings set \
            --resource-group "rg-srpf-prod-axsa" \
            --name api-srpf-databricks-axsa \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false WEBSITE_RUN_FROM_PACKAGE=1

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'api-srpf-databricks-axsa'
          slot-name: 'Production'
          package: .
          