name: Build and deploy SRF AXSA app to Azure Web App - api-srf-databricks-axsa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r serving/srf-axsa-api/requirements.txt

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: |
            serving/**
            presentation/**

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app-artifact

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0EB9137ECA2E4B1B887C883E4C19C002 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0D832E67C2104DA288F59A853B733030 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_24FBA15A370A4CD58B768EB252CFA6D3 }}

      - name: Enforce Node runtime and disable Oryx remote build
        run: |
          RG=$(az webapp list --query "[?name=='api-srf-databricks-axsa'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "Could not resolve resource group for app: api-srf-databricks-axsa"
            exit 1
          fi

          az webapp config set \
            --resource-group "$RG" \
            --name api-srf-databricks-axsa \
            --linux-fx-version "PYTHON|3.12" \
            --startup-file "python -m pip install -r serving/srf-axsa-api/requirements.txt && python -m uvicorn app:app --host 0.0.0.0 --port \$PORT --app-dir serving/srf-axsa-api"

          az webapp config appsettings set \
            --resource-group "$RG" \
            --name api-srf-databricks-axsa \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false WEBSITE_RUN_FROM_PACKAGE=1

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'api-srf-databricks-axsa'
          slot-name: 'Production'
          package: .
          