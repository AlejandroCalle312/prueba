name: Build and deploy Node app to Azure Web App - api-srf-prod-axsa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: |
            backend/**
            frontend/dist/**
            backend/.env.example
            frontend/.env.example
            README.md
            .gitignore

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app-artifact
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9E7ECEE4C39E47E783ED2F35B4FD1C5F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2A12DD0905804C33B0A47FC3196CF270 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_82E9F069707F4BD9BBF5A44848164D6E }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: api-srf-prod-axsa
          slot-name: Production
          package: .
